<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Expense Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}
.navbar {
    background: #343a40;
}
.card {
    border-radius: 12px;
}
.btn-primary {
    background: #007bff;
}
.dashboard-box {
    padding: 20px;
    text-align: center;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand mb-0 h1">🌍 Trip Expense Manager</span>
</nav>

<div class="container mt-4">

    <!-- DASHBOARD -->
    <div class="row">
        <div class="col-md-4">
            <div class="card dashboard-box">
                <h5>Total Trips</h5>
                <h2>3</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card dashboard-box">
                <h5>Total Spent</h5>
                <h2>₹45,000</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card dashboard-box">
                <h5>Total Budget</h5>
                <h2>₹60,000</h2>
            </div>
        </div>
    </div>

    <!-- TRIPS -->
    <div class="mt-5">
        <h3>Your Trips</h3>

        <div class="card p-3 mb-3">
            <h5>Goa Vacation</h5>
            <p>Destination: Goa</p>
            <p>Budget: ₹20,000</p>
            <button class="btn btn-primary" onclick="showTrip()">View Details</button>
        </div>

        <div class="card p-3 mb-3">
            <h5>Mumbai Trip</h5>
            <p>Destination: Mumbai</p>
            <p>Budget: ₹15,000</p>
            <button class="btn btn-primary" onclick="showTrip()">View Details</button>
        </div>
    </div>

    <!-- ADD EXPENSE -->
    <div class="mt-5">
        <h3>Add Expense</h3>
        <div class="card p-4">

            <input type="text" id="desc" class="form-control mb-2" placeholder="Description">
            <input type="number" id="amount" class="form-control mb-2" placeholder="Amount">

            <select id="category" class="form-control mb-2">
                <option>Food</option>
                <option>Travel</option>
                <option>Shopping</option>
            </select>

            <button class="btn btn-success" onclick="addExpense()">Add Expense</button>

        </div>
    </div>

    <!-- EXPENSE LIST -->
    <div class="mt-5">
        <h3>Expenses</h3>
        <ul class="list-group" id="expenseList"></ul>
    </div>

</div>

<script>
let expenses = [];

function addExpense() {
    let desc = document.getElementById("desc").value;
    let amount = document.getElementById("amount").value;
    let category = document.getElementById("category").value;

    if(desc === "" || amount === "") {
        alert("Fill all fields");
        return;
    }

    let expense = {
        desc,
        amount,
        category
    };

    expenses.push(expense);
    renderExpenses();
}

function renderExpenses() {
    let list = document.getElementById("expenseList");
    list.innerHTML = "";

    expenses.forEach((e, index) => {
        list.innerHTML += `
            <li class="list-group-item">
                ${e.desc} - ₹${e.amount} (${e.category})
                <button class="btn btn-danger btn-sm float-end" onclick="deleteExpense(${index})">Delete</button>
            </li>
        `;
    });
}

function deleteExpense(index) {
    expenses.splice(index, 1);
    renderExpenses();
}

function showTrip() {
    alert("This would open trip details (Flask backend)");
}
</script>

</body>
</html>
