<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trip Expense Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.hidden { display:none; }
.navbar { background:#212529; }
.card { border-radius:12px; }
</style>

</head>
<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">🌍 Trip Expense Manager</span>
</nav>

<div class="container mt-4">

<!-- LOGIN -->
<div id="loginPage">
    <h3>Login</h3>
    <input id="loginUser" class="form-control mb-2" placeholder="Username">
    <input id="loginPass" type="password" class="form-control mb-2" placeholder="Password">
    <button class="btn btn-primary" onclick="login()">Login</button>
    <p class="mt-2">No account? <a href="#" onclick="showRegister()">Register</a></p>
</div>

<!-- REGISTER -->
<div id="registerPage" class="hidden">
    <h3>Register</h3>
    <input id="regUser" class="form-control mb-2" placeholder="Username">
    <input id="regEmail" class="form-control mb-2" placeholder="Email">
    <input id="regPass" type="password" class="form-control mb-2" placeholder="Password">
    <button class="btn btn-success" onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">

    <div class="d-flex justify-content-between">
        <h3>Dashboard</h3>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <div class="row text-center mt-3">
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Total Trips</h5>
                <h2 id="totalTrips">0</h2>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Total Expenses</h5>
                <h2 id="totalSpent">₹0</h2>
            </div>
        </div>
    </div>

    <hr>

    <h4>Add Trip</h4>
    <input id="tripName" class="form-control mb-2" placeholder="Trip Name">
    <input id="destination" class="form-control mb-2" placeholder="Destination">
    <input id="budget" type="number" class="form-control mb-2" placeholder="Budget">
    <button class="btn btn-success" onclick="addTrip()">Add Trip</button>

    <hr>

    <div id="tripList"></div>

</div>

<!-- TRIP DETAILS -->
<div id="tripPage" class="hidden">

    <button class="btn btn-secondary mb-3" onclick="back()">⬅ Back</button>
    <h3 id="tripTitle"></h3>

    <input id="desc" class="form-control mb-2" placeholder="Description">
    <input id="amount" type="number" class="form-control mb-2" placeholder="Amount">

    <select id="category" class="form-control mb-2">
        <option>Food & Dining</option>
        <option>Transportation</option>
        <option>Shopping</option>
    </select>

    <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>

    <hr>

    <ul id="expenseList" class="list-group"></ul>

</div>

</div>

<script>

// ===== DATABASE (models.py converted) =====
let users = JSON.parse(localStorage.getItem("users")) || [];
let trips = JSON.parse(localStorage.getItem("trips")) || [];
let currentUser = null;
let currentTrip = null;

// ===== AUTH (app.py routes converted) =====
function register() {
    let user = document.getElementById("regUser").value;
    let email = document.getElementById("regEmail").value;
    let pass = document.getElementById("regPass").value;

    if(!user || !email || !pass) return alert("Fill all fields");

    users.push({user, email, pass});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Registered Successfully");
    showLogin();
}

function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let found = users.find(u => u.user === user && u.pass === pass);

    if(!found) return alert("Invalid credentials");

    currentUser = user;

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboardPage").classList.remove("hidden");

    renderDashboard();
}

function logout() {
    location.reload();
}

// ===== TRIPS =====
function addTrip() {
    let name = document.getElementById("tripName").value;
    let dest = document.getElementById("destination").value;
    let budget = document.getElementById("budget").value;

    trips.push({name, dest, budget, user: currentUser, expenses: []});

    save();
    renderDashboard();
}

function renderDashboard() {
    let userTrips = trips.filter(t => t.user === currentUser);

    document.getElementById("totalTrips").innerText = userTrips.length;

    let total = 0;
    userTrips.forEach(t => t.expenses.forEach(e => total += Number(e.amount)));

    document.getElementById("totalSpent").innerText = "₹" + total;

    let list = document.getElementById("tripList");
    list.innerHTML = "";

    userTrips.forEach((t,i)=>{
        list.innerHTML += `
        <div class="card p-3 mb-2">
            <h5>${t.name}</h5>
            <p>${t.dest}</p>
            <button class="btn btn-primary" onclick="openTrip(${i})">Open</button>
        </div>`;
    });
}

// ===== TRIP DETAILS =====
function openTrip(index) {
    currentTrip = index;

    document.getElementById("dashboardPage").classList.add("hidden");
    document.getElementById("tripPage").classList.remove("hidden");

    document.getElementById("tripTitle").innerText = trips[index].name;

    renderExpenses();
}

function addExpense() {
    let desc = document.getElementById("desc").value;
    let amount = document.getElementById("amount").value;
    let cat = document.getElementById("category").value;

    trips[currentTrip].expenses.push({desc, amount, cat});

    save();
    renderExpenses();
}

function renderExpenses() {
    let list = document.getElementById("expenseList");
    list.innerHTML = "";

    trips[currentTrip].expenses.forEach((e,i)=>{
        list.innerHTML += `
        <li class="list-group-item">
            ${e.desc} - ₹${e.amount}
            <button class="btn btn-danger btn-sm float-end" onclick="deleteExpense(${i})">Delete</button>
        </li>`;
    });
}

function deleteExpense(i) {
    trips[currentTrip].expenses.splice(i,1);
    save();
    renderExpenses();
}

// ===== NAVIGATION =====
function back() {
    document.getElementById("tripPage").classList.add("hidden");
    document.getElementById("dashboardPage").classList.remove("hidden");
    renderDashboard();
}

function showRegister() {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("registerPage").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}

// ===== SAVE =====
function save() {
    localStorage.setItem("trips", JSON.stringify(trips));
}

</script>

</body>
</html>
