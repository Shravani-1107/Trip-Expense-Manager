<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Expense Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.navbar { background:#212529; }
.card { border-radius:12px; }
.hidden { display:none; }
</style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">🌍 Trip Expense Manager</span>
</nav>

<div class="container mt-4">

<!-- LOGIN -->
<div id="loginPage">
    <h3>Login</h3>
    <input id="username" class="form-control mb-2" placeholder="Username">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">
    <button class="btn btn-primary" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">

    <div class="d-flex justify-content-between mb-3">
        <h3>Dashboard</h3>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <div class="row text-center">
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Total Trips</h5>
                <h2 id="totalTrips">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Total Spent</h5>
                <h2 id="totalSpent">₹0</h2>
            </div>
        </div>
    </div>

    <hr>

    <!-- ADD TRIP -->
    <h4>Add Trip</h4>
    <input id="tripName" class="form-control mb-2" placeholder="Trip Name">
    <input id="destination" class="form-control mb-2" placeholder="Destination">
    <input id="budget" type="number" class="form-control mb-2" placeholder="Budget">
    <button class="btn btn-success" onclick="addTrip()">Add Trip</button>

    <hr>

    <!-- TRIP LIST -->
    <h4>Your Trips</h4>
    <div id="tripList"></div>

</div>

<!-- TRIP DETAILS -->
<div id="tripPage" class="hidden">

    <button class="btn btn-secondary mb-3" onclick="back()">⬅ Back</button>

    <h3 id="tripTitle"></h3>

    <!-- ADD EXPENSE -->
    <input id="desc" class="form-control mb-2" placeholder="Description">
    <input id="amount" type="number" class="form-control mb-2" placeholder="Amount">

    <select id="category" class="form-control mb-2">
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
    </select>

    <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>

    <hr>

    <h4>Expenses</h4>
    <ul id="expenseList" class="list-group"></ul>

</div>

</div>

<script>
let trips = JSON.parse(localStorage.getItem("trips")) || [];
let currentTrip = null;

// LOGIN
function login() {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboardPage").classList.remove("hidden");
    renderDashboard();
}

function logout() {
    location.reload();
}

// DASHBOARD
function renderDashboard() {
    document.getElementById("totalTrips").innerText = trips.length;

    let total = 0;
    trips.forEach(t => {
        t.expenses.forEach(e => total += Number(e.amount));
    });

    document.getElementById("totalSpent").innerText = "₹" + total;

    renderTrips();
}

// ADD TRIP
function addTrip() {
    let name = document.getElementById("tripName").value;
    let dest = document.getElementById("destination").value;
    let budget = document.getElementById("budget").value;

    if(!name || !dest) return alert("Fill all fields");

    let trip = {
        name,
        dest,
        budget,
        expenses:[]
    };

    trips.push(trip);
    save();
    renderDashboard();
}

// RENDER TRIPS
function renderTrips() {
    let list = document.getElementById("tripList");
    list.innerHTML = "";

    trips.forEach((t,i)=>{
        list.innerHTML += `
            <div class="card p-3 mb-2">
                <h5>${t.name}</h5>
                <p>${t.dest}</p>
                <button class="btn btn-primary" onclick="openTrip(${i})">Open</button>
            </div>
        `;
    });
}

// OPEN TRIP
function openTrip(index) {
    currentTrip = index;

    document.getElementById("dashboardPage").classList.add("hidden");
    document.getElementById("tripPage").classList.remove("hidden");

    document.getElementById("tripTitle").innerText = trips[index].name;

    renderExpenses();
}

// ADD EXPENSE
function addExpense() {
    let desc = document.getElementById("desc").value;
    let amount = document.getElementById("amount").value;
    let cat = document.getElementById("category").value;

    if(!desc || !amount) return alert("Fill fields");

    trips[currentTrip].expenses.push({desc, amount, cat});
    save();
    renderExpenses();
}

// RENDER EXPENSES
function renderExpenses() {
    let list = document.getElementById("expenseList");
    list.innerHTML = "";

    trips[currentTrip].expenses.forEach((e,i)=>{
        list.innerHTML += `
        <li class="list-group-item">
            ${e.desc} - ₹${e.amount} (${e.cat})
            <button class="btn btn-danger btn-sm float-end" onclick="deleteExpense(${i})">Delete</button>
        </li>`;
    });
}

// DELETE EXPENSE
function deleteExpense(i) {
    trips[currentTrip].expenses.splice(i,1);
    save();
    renderExpenses();
}

// BACK
function back() {
    document.getElementById("tripPage").classList.add("hidden");
    document.getElementById("dashboardPage").classList.remove("hidden");
    renderDashboard();
}

// SAVE
function save() {
    localStorage.setItem("trips", JSON.stringify(trips));
}
</script>

</body>
</html>
