<!DOCTYPE html>
<html>
<head>
    <title>Forms Conversion</title>
</head>
<body>

<h2>Registration Form</h2>

<form onsubmit="return validateRegister()">
    <input id="username" placeholder="Username"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <input id="confirm" type="password" placeholder="Confirm Password"><br><br>
    <button type="submit">Register</button>
</form>

<hr>

<h2>Login Form</h2>

<form onsubmit="return validateLogin()">
    <input id="loginUser" placeholder="Username"><br><br>
    <input id="loginPass" type="password" placeholder="Password"><br><br>
    <button type="submit">Login</button>
</form>

<hr>

<h2>Trip Form</h2>

<form onsubmit="return validateTrip()">
    <input id="tripName" placeholder="Trip Name"><br><br>
    <input id="destination" placeholder="Destination"><br><br>
    <input id="startDate" type="date"><br><br>
    <input id="endDate" type="date"><br><br>
    <input id="budget" type="number" placeholder="Budget"><br><br>
    <textarea id="desc" placeholder="Description"></textarea><br><br>
    <button type="submit">Save Trip</button>
</form>

<hr>

<h2>Expense Form</h2>

<form onsubmit="return validateExpense()">
    <input id="expDesc" placeholder="Description"><br><br>
    <input id="amount" type="number" placeholder="Amount"><br><br>

    <select id="category">
        <option>Food & Dining</option>
        <option>Transportation</option>
        <option>Shopping</option>
    </select><br><br>

    <input id="date" type="date"><br><br>

    <input id="location" placeholder="Location"><br><br>

    <select id="payment">
        <option>Cash</option>
        <option>UPI</option>
        <option>Card</option>
    </select><br><br>

    <textarea id="notes" placeholder="Notes"></textarea><br><br>

    <button type="submit">Save Expense</button>
</form>

<script>

// ===== VALIDATIONS (converted from WTForms validators) =====

// Registration
function validateRegister() {
    let u = username.value;
    let e = email.value;
    let p = password.value;
    let c = confirm.value;

    if(!u || u.length < 3 || u.length > 20) {
        alert("Username must be 3-20 characters");
        return false;
    }

    if(!e.includes("@")) {
        alert("Invalid email");
        return false;
    }

    if(p.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
    }

    if(p !== c) {
        alert("Passwords must match");
        return false;
    }

    return true;
}

// Login
function validateLogin() {
    if(!loginUser.value || !loginPass.value) {
        alert("Enter username and password");
        return false;
    }
    return true;
}

// Trip
function validateTrip() {
    if(!tripName.value || !destination.value) {
        alert("Fill all fields");
        return false;
    }

    if(endDate.value < startDate.value) {
        alert("End date cannot be before start date");
        return false;
    }

    return true;
}

// Expense
function validateExpense() {
    if(!expDesc.value) {
        alert("Description required");
        return false;
    }

    if(amount.value <= 0) {
        alert("Amount must be greater than 0");
        return false;
    }

    if(!date.value) {
        alert("Date required");
        return false;
    }

    return true;
}

</script>

</body>
</html>
